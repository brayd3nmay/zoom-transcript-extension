<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Zoom Transcript Downloader</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      width: 240px;
      margin: 0;
      padding: 16px;
      font-size: 14px;
      color: #1a1a1a;
    }
    h1 {
      font-size: 14px;
      font-weight: 600;
      margin: 0 0 12px 0;
    }
    #status {
      font-size: 12px;
      color: #666;
      margin-bottom: 12px;
      min-height: 16px;
    }
    #status.error { color: #c62828; }
    #status.success { color: #2e7d32; }
    #download {
      width: 100%;
      padding: 8px 12px;
      font-size: 14px;
      background: #2D8CFF;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    #download:disabled {
      background: #ccc;
      cursor: not-allowed;
    }
    #download:hover:not(:disabled) {
      background: #1976d2;
    }
  </style>
</head>
<body>
  <h1>Zoom Transcript</h1>
  <div id="status" role="status" aria-live="polite"></div>
  <button id="download" disabled>Download Transcript</button>
  <script type="module" src="popup.js"></script>
</body>
</html>
